{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<div class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

        <!-- TÍTULO -->
        <h2 class="text-2xl font-bold text-center mb-6">
            Mi Perfil 
        </h2>

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <!-- FOTO -->
            <div class="flex flex-col items-center">
                <label class="font-medium mb-2">Foto de perfil</label>

                {% if usuario.foto %}
                    <img src="{{ usuario.foto.url }}"
                         class="w-24 h-24 rounded-full object-cover border mb-3">
                {% else %}
                    <div class="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center mb-3">
                        <span class="text-gray-500 text-sm">Sin foto</span>
                    </div>
                {% endif %}

                <input type="file" name="foto"
                       class="text-sm border rounded px-2 py-1 w-full">
            </div>

            <!-- NOMBRE -->
            <div>
                <label class="block font-medium mb-1">Nombre</label>
                <input type="text"
                       name="nombre"
                       value="{{ usuario.nombre }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- EMAIL -->
            <div>
                <label class="block font-medium mb-1">Email</label>
                <input type="email"
                       name="email"
                       value="{{ usuario.email }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- EMAIL -->
            <div>
                <label class="block font-medium mb-1">Apellido</label>
                <input type="text"
                       name="apellido"
                       value="{{ usuario.apellido }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>



            <!-- PASSWORD -->
            <div>
                <label class="block font-medium mb-1">Nueva contraseña</label>
                <input type="password"
                       name="password"
                       placeholder="••••••••"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

                <p class="text-xs text-gray-500 mt-1">
                    Déjala vacía si no deseas cambiarla
                </p>
            </div>

            <!-- BOTÓN -->
            <button type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition duration-200">
                Guardar Cambios
            </button>

        </form>

    </div>

</div>

{% endblock %}
