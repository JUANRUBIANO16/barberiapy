{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ragnarok Barber</title>

<!-- Favicon -->
<link rel="icon" href="{% static 'img/favicon/favicon.ico' %}" />

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans&display=swap" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="{% static 'vendor/fonts/iconify-icons.css' %}">

<!-- CORE CSS -->
<link rel="stylesheet" href="{% static 'vendor/css/core.css' %}">
<link rel="stylesheet" href="{% static 'css/demo.css' %}">

<!-- SCROLL -->
<link rel="stylesheet" href="{% static 'vendor/libs/perfect-scrollbar/perfect-scrollbar.css' %}">

<!-- helpers -->
<script src="{% static 'vendor/js/helpers.js' %}"></script>

<!-- config -->
<script src="{% static 'js/config.js' %}"></script>

</head>


<body>

<div class="layout-wrapper layout-content-navbar">

<div class="layout-container">

<!-- SIDEBAR -->
{% include "includes/component/sidebar.html" %}

<div class="layout-page">

<!-- NAVBAR -->
{% include "includes/component/navbar.html" %}

<!-- CONTENIDO -->
<div class="content-wrapper">

{% block content %}
{% endblock %}

</div>

</div>

</div>

</div>

<!-- JS -->

<script src="{% static 'vendor/libs/jquery/jquery.js' %}"></script>
<script src="{% static 'vendor/libs/popper/popper.js' %}"></script>
<script src="{% static 'vendor/js/bootstrap.js' %}"></script>
<script src="{% static 'vendor/libs/perfect-scrollbar/perfect-scrollbar.js' %}"></script>
<script src="{% static 'vendor/js/menu.js' %}"></script>

<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
