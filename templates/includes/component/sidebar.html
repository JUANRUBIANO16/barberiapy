{% load static %}
<aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">

<style>
#layout-menu {
    background: linear-gradient(180deg, #0f1a2b, #0b1422);
    color: #fff;
}

/* Header */
.app-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
}

.app-brand-text {
    color: #4da3ff !important;
    font-size: 22px;
    font-weight: bold;
}

/* Perfil */
.profile-box {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.profile-box img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
}

.profile-info {
    font-size: 14px;
}

.profile-info span {
    display: block;
    color: #8fa1c2;
    font-size: 12px;
}

/* Items */
.menu-link {
    color: #c7d0e0 !important;
    padding: 12px 16px;
    border-radius: 8px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
}

.menu-link:hover {
    background: rgba(255,255,255,0.05);
    color: #fff !important;
}

/* Iconos */
.menu-icon {
    color: #9fb0d1;
    font-size: 20px;
}

/* Salir */
.logout {
    margin-top: 20px;
    color: #ff6b6b !important;
}

.logout:hover {
    background: rgba(255,0,0,0.1);
}
</style>

<!-- Logo -->
<div class="app-brand">
    <span class="app-brand-text">ADMIN</span>
</div>

<!-- Perfil -->
<div class="profile-box">
    <img src="https://i.pravatar.cc/100" alt="">
    <div class="profile-info">
        admin@gmail.com
        <span>Administrador</span>
    </div>
</div>

<ul class="menu-inner py-2">

<!-- Dashboard -->
<li class="menu-item">
    <a href="{% url 'dashboard' %}" class="menu-link">
        <i class="menu-icon bx bx-home-smile"></i>
        <div>Dashboard</div>
    </a>
</li>

<!-- Citas -->
<li class="menu-item">
    <a href="{% url 'citas' %}" class="menu-link">
        <i class="menu-icon bx bx-calendar"></i>
        <div>Citas</div>
    </a>
</li>

<!-- Usuarios -->
<li class="menu-item">
    <a href="{% url 'usuarios' %}" class="menu-link">
        <i class="menu-icon bx bx-user"></i>
        <div>Usuarios</div>
    </a>
</li>

<!-- Servicios -->
<li class="menu-item">
    <a href="{% url 'listar_servicios' %}" class="menu-link">
        <i class="menu-icon bx bx-box"></i>
        <div>Servicios</div>
    </a>
</li>

<!-- Comprobantes -->
<li class="menu-item">
    <a href="{% url 'comprobantes' %}" class="menu-link">
        <i class="menu-icon bx bx-receipt"></i>
        <div>Comprobantes</div>
    </a>
</li>

<!-- Servicios duplicado (lo dejé porque ya lo tenías) -->
<li class="menu-item">
    <a href="{% url 'listar_servicios' %}" class="menu-link">
        <i class="menu-icon bx bx-receipt"></i>
        <div>servicios</div>
    </a>
</li>

<!-- Salir -->
<li class="menu-item">
    <a href="#" class="menu-link logout">
        <i class="menu-icon bx bx-log-out"></i>
        <div>Salir</div>
    </a>
</li>

</ul>

</aside>
