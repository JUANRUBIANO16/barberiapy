{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragnarok Barber - Recuperar contraseña</title>
    <link rel="stylesheet" href="{% static 'css/logins.css' %}">

    <style>
        .extra-link {
            text-align: center;
            margin-top: 15px;
        }

        .extra-link a {
            font-size: 14px;
            color: #4da3ff;
            text-decoration: none;
            transition: 0.3s;
        }

        .extra-link a:hover {
            text-decoration: underline;
            color: #6bb8ff;
        }

        /* ✅ MENSAJES BONITOS */
        .messages-container {
            margin-bottom: 15px;
        }

        .custom-alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 10px;
            animation: fadeIn 0.4s ease;
            font-weight: 500;
            border-left: 4px solid;
            transition: all 0.3s ease;
        }

        .custom-alert.success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-color: #10b981;
        }

        .custom-alert.error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: #ef4444;
        }

        .custom-alert.warning {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border-color: #f59e0b;
        }

        .custom-alert.info {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border-color: #3b82f6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">

            <div class="login-header">
                <div class="logo">
                    <img src="{% static 'img/jj2.png' %}" alt="Logo" width="40">
                </div>
                <h1>Ragnarok Barber</h1>
                <p>Recupera el acceso a tu cuenta</p>
            </div>

            <!-- ✅ MENSAJES -->
            {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                    <div class="custom-alert {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" class="login-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <button type="submit" class="login-btn">
                    Enviar enlace
                </button>
            </form>

            <div class="extra-link">
                <a href="{% url 'loguin' %}">
                    Volver al login
                </a>
            </div>
        </div>
    </div>

    <script>
        // ✅ AUTO DESAPARECER MENSAJES
        setTimeout(() => {
            document.querySelectorAll('.custom-alert').forEach(alert => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-10px)';
                setTimeout(() => alert.remove(), 300);
            });
        }, 3000);
    </script>
</body>
</html>
